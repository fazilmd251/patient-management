server:
  port: 5001

spring:
  cloud:
    gateway:
      routes:
        - id: patient-service-route
          uri: http://patient-service:4000
          predicates:
            - Path=/api/patients/**
          filters:
            - StripPrefix=1
            - JwtValidation

        - id: auth-service-route
          uri: http://auth-service:4004
          predicates:
            - Path=/api/auth/**
          filters:
            - StripPrefix=1

